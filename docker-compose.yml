version: '3.9'

services:
  # ── Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pulseboard_nginx
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pulseboard

  # ── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulseboard_backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_use_a_long_random_string}
      DB_PATH: /app/data/pulseboard.db
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - pb_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - pulseboard

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulseboard_frontend
    restart: unless-stopped
    networks:
      - pulseboard

networks:
  pulseboard:
    driver: bridge

volumes:
  pb_data:
    driver: local
